# ──────────────────────────────────────────────────────────────
# EpiasPriceNotifier — Worker + SigNoz integration
# ──────────────────────────────────────────────────────────────
# Worker'ı container içinde başlatır.
# SigNoz ayrıca signoz-foundry/ klasöründe çalışıyor (Foundry CLI ile).
# Bu compose, Worker'ı SigNoz'un network'üne external olarak bağlar
# böylece "signoz-ingester-1:4317" hostname'i ile OTel collector'a ulaşır.
# ──────────────────────────────────────────────────────────────

services:
  worker:
    build:
      context: .
      dockerfile: src/EpiasPriceNotifier.Worker/Dockerfile
    image: epias-price-notifier:latest
    container_name: epias-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__Default: "Data Source=/app/data/epias-price-notifier.db"
    ports:
      - "5227:8080"
    volumes:
      - ./data:/app/data
    networks:
      - signoz-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  signoz-network:
    external: true
    name: signoz-network
