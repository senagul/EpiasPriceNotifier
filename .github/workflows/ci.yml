name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test - Domain
        run: dotnet test tests/EpiasPriceNotifier.Domain.UnitTests/EpiasPriceNotifier.Domain.UnitTests.csproj --configuration Release --verbosity normal

      - name: Test - Application
        run: dotnet test tests/EpiasPriceNotifier.Application.UnitTests/EpiasPriceNotifier.Application.UnitTests.csproj --configuration Release --verbosity normal

      - name: Test - Integration
        run: dotnet test tests/EpiasPriceNotifier.IntegrationTests/EpiasPriceNotifier.IntegrationTests.csproj --configuration Release --verbosity normal

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/EpiasPriceNotifier.Worker/Dockerfile
          push: false
          tags: epias-price-notifier:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
