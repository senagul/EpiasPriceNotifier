# ??????????????????????????????????????????????????????????????
# EpiasPriceNotifier ? Worker + SigNoz integration
# ??????????????????????????????????????????????????????????????
# Worker'? container i?inde ba?lat?r.
# SigNoz ayr?ca signoz-foundry/ klas?r?nde ?al???yor (Foundry CLI ile).
# Bu compose, Worker'? SigNoz'un network'?ne external olarak ba?lar
# b?ylece "signoz-ingester-1:4317" hostname'i ile OTel collector'a ula??r.
# ??????????????????????????????????????????????????????????????

services:
  worker:
    build:
      context: .
      dockerfile: src/EpiasPriceNotifier.Worker/Dockerfile
    image: epias-price-notifier:latest
    container_name: epias-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__Default: "Data Source=/app/data/epias-price-notifier.db"
    ports:
      - "5227:8080"
    volumes:
      - ./data:/app/data
    networks:
      - signoz-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ || exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  signoz-network:
    external: true
    name: signoz-network
